name: Deploy to Scaleway
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Scaleway
        uses: docker/login-action@v3
        with:
          registry: rg.nl-ams.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and Push
        run: |
          # We are tagging your app as 'ocean' inside the 'skybluelab' registry
          docker build -t rg.nl-ams.scw.cloud/skybluelab/ocean:latest .
          docker push rg.nl-ams.scw.cloud/skybluelab/ocean:latest
