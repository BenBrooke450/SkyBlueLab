name: Deploy to Scaleway

on:
  push:
    branches: [ main ]

jobs:
  deploy-to-vps:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into VPS and Refresh
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.VPS_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          envs: GITHUB_SHA
          script: |
            set -e
            
            IMAGE=rg.nl-ams.scw.cloud/skybluelab/ocean:$GITHUB_SHA
            
            echo "${{ secrets.SCW_SECRET_KEY }}" | sudo docker login rg.nl-ams.scw.cloud -u nologin --password-stdin
            
            sudo docker pull $IMAGE
            
            sudo docker stop skyblue-app || true
            sudo docker rm -f skyblue-app || true
            sudo docker rm -f skyblue-api || true
            
            sudo docker run -d \
              --name skyblue-app \
              -p 80:8080 \
              -v /model_weights_tokeniser:/data \
              $IMAGE
            
            sudo docker image prune -af